version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotelmanagementsystem_app
    ports:
      - '8080:80'
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_DRIVER: database
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    depends_on: []
